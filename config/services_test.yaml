# config/services_test.yaml
services:
    # Ensure all services defined here are public for test access
    _defaults:
        public: true

    # GameService configuration with explicit dependencies
    App\Service\GameService:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $session: '@session'

    # ProgressService configuration
    App\Service\ProgressService:
        arguments:
            $em: '@doctrine.orm.entity_manager'

    # Mock session storage for tests
    session.storage.mock_array:
        class: Symfony\Component\HttpFoundation\Session\Storage\MockArraySessionStorage

    # Session service using mock storage
    Symfony\Component\HttpFoundation\Session\Session:
        alias: session

    session:
        class: Symfony\Component\HttpFoundation\Session\Session
        arguments: ['@session.storage.mock_array']
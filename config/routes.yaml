controllers:
  resource: ../src/Controller/
  type: annotation

kernel:
  resource: ../src/Kernel.php
  type: annotation
app_manage_children:
  path: /parent/{parentId}/manage-children
  controller: App\Controller\ChildController::manageChildren
  methods: GET

app_edit_child:
  path: /child/{childId}/edit
  controller: App\Controller\ChildController::editChild
  methods: [GET, POST]

app_delete_child:
  path: /child/{childId}/delete
  controller: App\Controller\ChildController::deleteChild
  methods: [POST, DELETE]

dragdrop_next_sentence:
  path: /dragdrop/next-sentence/{childId}
  controller: App\Controller\DragdropController::nextSentence
  methods: [POST]
child_dashboard:
  path: /child/{parentId}/{childId}
  controller: App\Controller\ChildController::dashboard
  methods: GET
index:
  path: /
  controller: App\Controller\SecurityController::login

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  gemini_api_key: "%env(GEMINI_API_KEY)%"
  upload_dir: "%kernel.project_dir%/public/uploads/images"
  ai_api_key: "%env(AI_API_KEY)%"

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  App\Service\GoogleAIUtilService:
    arguments:
      $httpClient: "@http_client"
      $jeudedevinetteRepository: '@App\Repository\JeudedevinetteRepository'
      $logger: "@monolog.logger"
      $googleApiKey: "%env(GOOGLE_AI_API_KEY)%"

  App\Controller\JeuController:
    arguments:
      $childRepository: '@App\Repository\ChildRepository'
      $pronunciationContentRepository: '@App\Repository\PronunciationContentRepository'
      $gameRepository: '@App\Repository\GameRepository'
      $entityManager: "@doctrine.orm.entity_manager"
  Symfony\Component\HttpFoundation\Session\Session:
    public: true

  Symfony\Component\HttpFoundation\Session\SessionInterface: '@Symfony\Component\HttpFoundation\Session\Session'
  App\Service\GameService:
    arguments:
      $em: "@doctrine.orm.entity_manager"
      $session: '@Symfony\Component\HttpFoundation\Session\SessionInterface'

  App\Service\ProgressService:
    arguments:
      $em: "@doctrine.orm.entity_manager"
  App\Service\AIService:

  App\Controller\AdminController:
    arguments:
      $aiApiKey: "%ai_api_key%"
      $logger: "@monolog.logger"

  App\Service\AdminService:
    arguments:
      $uploadDir: "%upload_dir%"

  App\Service\DragdropGameService:
    arguments:
      $params: "@parameter_bag"
      $entityManager: "@doctrine.orm.entity_manager"
      $dragdropRepository: '@App\Repository\DragdropRepository'
